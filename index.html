<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>الأخلاق التجارية | شاشة يوتيوب متكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@400;700&family=Tajawal:wght@400;700;800&family=Almarai:wght@400;700;800&family=Noto+Kufi+Arabic:wght@400;700&family=Changa:wght@400;600;800&family=Markazi+Text:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050a);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .youtube-like-container {
            width: 100%;
            max-width: 1100px;
            background: transparent;
            border-radius: 28px;
            overflow: visible;
        }
        .video-stage {
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,0,0.2);
            position: relative;
        }
        #displayArea {
            width: 100%;
            aspect-ratio: 16/9;
            background: #010101;
            position: relative;
            overflow: hidden;
        }
        #bgImage {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            filter: none;
            z-index: 0;
        }
        .text-overlay {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.6) 100%);
            padding: 20px;
            pointer-events: none;
        }
        #outTitle {
            font-size: clamp(1.8rem, 6vw, 3.8rem);
            font-weight: 900;
            margin: 0;
            text-shadow: 0 4px 20px black;
            pointer-events: none;
        }
        /* مربع المتحدث (الزهراني) منفصل وقابل للتعديل */
        .speaker-editable {
            margin-top: 12px;
            display: inline-block;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 24px;
            border-radius: 60px;
            font-weight: 700;
            border-width: 2px;
            border-style: solid;
            cursor: pointer;
            transition: 0.2s;
            pointer-events: auto;
        }
        .speaker-editable span {
            font-size: clamp(0.9rem, 3.5vw, 1.3rem);
        }
        .speaker-editable:hover {
            transform: scale(1.02);
            background: rgba(0,0,0,0.8);
        }
        .speaker-input {
            margin-top: 12px;
            background: #1e1e2e;
            border: 1px solid #f1c40f;
            border-radius: 60px;
            padding: 6px 20px;
            color: white;
            font-size: 1rem;
            text-align: center;
            display: none;
            width: auto;
            min-width: 200px;
            pointer-events: auto;
        }
        /* مربع "تصميم فاخر" في أسفل اليمين */
        .corner-text {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #ffd966;
            border-right: 3px solid #f1c40f;
            cursor: pointer;
            transition: 0.2s;
            pointer-events: auto;
        }
        .corner-text:hover {
            background: rgba(0,0,0,0.8);
            transform: scale(1.02);
        }
        .corner-edit {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 25;
            background: #1e1e2eef;
            border: 1px solid #f1c40f;
            border-radius: 40px;
            padding: 5px 12px;
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            width: auto;
            min-width: 150px;
            display: none;
            pointer-events: auto;
        }
        /* مربع اسم القناة في أسفل اليسار */
        .channel-editable {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #ffd966;
            border-left: 3px solid #f1c40f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            pointer-events: auto;
        }
        .channel-editable:hover {
            background: rgba(0,0,0,0.8);
            transform: scale(1.02);
        }
        .channel-editable span { max-width: 200px; white-space: nowrap; overflow-x: auto; }
        .channel-input {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #1e1e2eef;
            border: 1px solid #f1c40f;
            border-radius: 40px;
            padding: 5px 12px;
            color: white;
            font-size: 0.85rem;
            width: auto;
            min-width: 180px;
            display: none;
            z-index: 25;
            pointer-events: auto;
        }
        /* شريط أزرار التفاعل (وسط أسفل) */
        .video-overlay-actions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,215,0,0.4);
            pointer-events: auto;
        }
        .overlay-icon-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
        }
        .overlay-icon-btn i { font-size: 1rem; }
        .overlay-icon-btn.liked { background: #3b82f6; }
        .overlay-icon-btn:hover { background: rgba(255,255,255,0.3); transform: scale(0.96); }
        .subscribe-overlay { background: #cc0000; }
        .subscribe-overlay.subscribed { background: #272727; color: #aaa; }
        .play-pause-overlay { background: #f1c40f; color: #1e1e2a; }
        
        #vizCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        /* لوحة الإعدادات */
        .settings-panel {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: #0f1422ee;
            backdrop-filter: blur(16px);
            padding: 15px;
            border-radius: 24px;
            border: 1px solid gold;
            z-index: 300;
            width: 280px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .settings-panel label { color: #ffd966; font-size: 0.8rem; }
        .settings-panel input, .settings-panel select {
            background: #1e1e2e;
            color: white;
            border-radius: 40px;
            padding: 6px 12px;
            border: none;
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: gold;
        }
        .close-settings {
            cursor: pointer;
            background: #333;
            padding: 2px 8px;
            border-radius: 30px;
        }
        .status-msg {
            margin-top: 12px;
            text-align: center;
            font-size: 0.75rem;
            color: #ccccccaa;
        }
        .settings-toggle-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #ffd966;
            cursor: pointer;
            z-index: 200;
            border: 1px solid #ffd966aa;
            font-weight: bold;
            transition: 0.2s;
        }
        .settings-toggle-btn:hover {
            background: #f1c40f33;
        }
        @media (max-width: 700px) {
            .video-overlay-actions { gap: 6px; padding: 5px 12px; }
            .overlay-icon-btn { padding: 4px 10px; font-size: 0.7rem; }
            .channel-editable { font-size: 0.7rem; max-width: 140px; }
            .corner-text { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="youtube-like-container">
    <div class="video-stage">
        <div id="displayArea">
            <img id="bgImage" src="" style="display: none;">
            <canvas id="vizCanvas"></canvas>
            <div class="text-overlay">
                <h1 id="outTitle">الأخلاق التجارية</h1>
                <div id="speakerBox" class="speaker-editable" onclick="activateSpeakerEdit()">
                    <span id="outSpeaker">كليب بن أحمد الزهراني</span>
                </div>
                <input type="text" id="speakerInput" class="speaker-input" placeholder="اسم المتحدث">
            </div>
            <!-- مربع النص السفلي (يمين) -->
            <div id="cornerTextDisplay" class="corner-text" onclick="activateCornerEdit()">✨ تصميم فاخر</div>
            <input type="text" id="cornerTextInput" class="corner-edit" placeholder="اكتب نصاً...">
            <!-- مربع اسم القناة (يسار) -->
            <div id="channelNameDisplay" class="channel-editable" onclick="activateChannelEdit()">
                <span id="channelNameSpan">قناة الأخلاقيات | كليب الزهراني</span>
                <i class="fas fa-pen"></i>
            </div>
            <input type="text" id="channelNameInput" class="channel-input" placeholder="اسم القناة">
            <!-- أزرار التفاعل في الوسط -->
            <div class="video-overlay-actions">
                <button id="likeOverlayBtn" class="overlay-icon-btn"><i class="far fa-thumbs-up"></i> <span id="likeCountOverlay">١٢٤</span></button>
                <button id="subscribeOverlayBtn" class="overlay-icon-btn subscribe-overlay">اشترك <i class="far fa-bell"></i></button>
                <button id="shareOverlayBtn" class="overlay-icon-btn"><i class="fas fa-share-alt"></i> مشاركة</button>
                <button id="playPauseOverlayBtn" class="overlay-icon-btn play-pause-overlay"><i id="playIconOverlay" class="fas fa-play"></i> <span id="playTextOverlay">تشغيل</span></button>
            </div>
        </div>
    </div>
    <div class="status-msg" id="audioStatusMsg">🔊 اختر ملفًا صوتيًا لبدء التجربة</div>
</div>

<button id="settingsToggleBtn" class="settings-toggle-btn">⚙️ إظهار الإعدادات</button>

<div id="advancedSettings" class="settings-panel">
    <div class="settings-header"><strong>الإعدادات المتقدمة</strong><span id="closeSettingsBtn" class="close-settings">✖</span></div>
    <label>📝 عنوان العرض</label><input type="text" id="inTitle" value="الأخلاق التجارية">
    <label>🎙️ اسم المتحدث (افتراضي)</label><input type="text" id="inSpeaker" value="كليب بن أحمد الزهراني">
    <label>✒️ الخط (اختر من 7 خطوط)</label>
    <select id="fontSelect">
        <option value="Cairo">كايرو</option><option value="Amiri">أميري</option><option value="Tajawal">تجوال</option>
        <option value="Almarai">المراعي</option><option value="Noto Kufi Arabic">نوتو كوفي</option>
        <option value="Changa">تشانغا</option><option value="Markazi Text">مركزي</option>
    </select>
    <label>🎨 لون النص</label><input type="color" id="colorPicker" value="#f7d44a">
    <label>🖼️ خلفية (صورة واضحة)</label><input type="file" id="imgUpload" accept="image/*">
    <label>🎵 ملف صوتي</label><input type="file" id="audioUpload" accept="audio/*">
    <label>📊 نمط الذبذبة</label>
    <select id="vizStyleSelect">
        <option value="radial">شعاعي</option><option value="waveform">موجة أفقية</option>
        <option value="linePulse">خط نابض</option><option value="circleBars">دوائر</option>
    </select>
    <label>📍 موضع الذبذبة</label>
    <select id="vizPositionSelect"><option value="center">وسط</option><option value="top">أعلى</option><option value="bottom">أسفل</option></select>
    <label>🎨 لون المؤثرات</label><input type="color" id="vizColorPicker" value="#ffaa33">
    <label>📏 حجم المؤثرات</label><input type="range" id="vizSizeSlider" min="30" max="180" value="85">
</div>

<audio id="audioElement" style="display: none;"></audio>

<script>
    // عناصر DOM
    const outTitle = document.getElementById('outTitle');
    const outSpeakerSpan = document.getElementById('outSpeaker');
    const speakerBox = document.getElementById('speakerBox');
    const speakerInput = document.getElementById('speakerInput');
    const bgImage = document.getElementById('bgImage');
    const vizCanvas = document.getElementById('vizCanvas');
    const audioElem = document.getElementById('audioElement');
    const audioStatusSpan = document.getElementById('audioStatusMsg');
    const likeOverlayBtn = document.getElementById('likeOverlayBtn');
    const likeCountOverlay = document.getElementById('likeCountOverlay');
    const subscribeOverlayBtn = document.getElementById('subscribeOverlayBtn');
    const shareOverlayBtn = document.getElementById('shareOverlayBtn');
    const playPauseOverlayBtn = document.getElementById('playPauseOverlayBtn');
    const playIconOverlay = document.getElementById('playIconOverlay');
    const playTextOverlay = document.getElementById('playTextOverlay');
    const channelNameSpan = document.getElementById('channelNameSpan');
    const channelNameInput = document.getElementById('channelNameInput');
    const cornerTextDisplay = document.getElementById('cornerTextDisplay');
    const cornerTextInput = document.getElementById('cornerTextInput');
    const settingsPanel = document.getElementById('advancedSettings');
    const settingsToggleBtn = document.getElementById('settingsToggleBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const inTitle = document.getElementById('inTitle');
    const inSpeakerHidden = document.getElementById('inSpeaker');
    const fontSelect = document.getElementById('fontSelect');
    const colorPicker = document.getElementById('colorPicker');
    const imgUpload = document.getElementById('imgUpload');
    const audioUpload = document.getElementById('audioUpload');
    const vizStyleSelect = document.getElementById('vizStyleSelect');
    const vizPositionSelect = document.getElementById('vizPositionSelect');
    const vizColorPicker = document.getElementById('vizColorPicker');
    const vizSizeSlider = document.getElementById('vizSizeSlider');
    
    let liked = false, subscribed = false;
    let likeCount = 124;
    let audioContext = null, analyserNode = null, sourceNode = null, animationId = null;
    let isAudioActive = false, isPlaying = false;
    let freqDataArray = null;
    let canvasCtx = null, canvasWidth = 0, canvasHeight = 0;
    let currentStyle = "radial", currentPosition = "center", currentVizColor = "#ffaa33", currentSize = 85;
    
    // تحديث النصوص والألوان
    function updateTextAndStyle() {
        outTitle.innerText = inTitle.value;
        outSpeakerSpan.innerText = inSpeakerHidden.value;
        const chosenFont = fontSelect.value;
        const textColor = colorPicker.value;
        outTitle.style.fontFamily = chosenFont;
        outSpeakerSpan.style.fontFamily = chosenFont;
        speakerBox.style.fontFamily = chosenFont;
        outTitle.style.color = textColor;
        outTitle.style.textShadow = `0 2px 12px black`;
        outSpeakerSpan.style.color = textColor;
        speakerBox.style.borderColor = textColor;
        speakerBox.style.color = textColor;
    }
    
    // تعديل اسم المتحدث
    function activateSpeakerEdit() {
        speakerInput.style.display = 'inline-block';
        speakerInput.value = outSpeakerSpan.innerText;
        speakerInput.focus();
        const saveSpeaker = () => {
            let newName = speakerInput.value.trim();
            if(newName === "") newName = "متحدث غير معروف";
            outSpeakerSpan.innerText = newName;
            inSpeakerHidden.value = newName;
            speakerInput.style.display = 'none';
            speakerInput.removeEventListener('blur', saveSpeaker);
            speakerInput.removeEventListener('keypress', keyHandler);
        };
        const keyHandler = (e) => { if(e.key === 'Enter') saveSpeaker(); };
        speakerInput.addEventListener('blur', saveSpeaker);
        speakerInput.addEventListener('keypress', keyHandler);
    }
    
    // تعديل اسم القناة (يسار)
    function activateChannelEdit() {
        channelNameInput.style.display = 'block';
        channelNameInput.value = channelNameSpan.innerText;
        channelNameInput.focus();
        const saveChannel = () => {
            let newName = channelNameInput.value.trim();
            if(newName === "") newName = "قناة غير مسماة";
            channelNameSpan.innerText = newName;
            channelNameInput.style.display = 'none';
            channelNameInput.removeEventListener('blur', saveChannel);
            channelNameInput.removeEventListener('keypress', keyHandler);
        };
        const keyHandler = (e) => { if(e.key === 'Enter') saveChannel(); };
        channelNameInput.addEventListener('blur', saveChannel);
        channelNameInput.addEventListener('keypress', keyHandler);
    }
    
    // تعديل النص السفلي (يمين)
    function activateCornerEdit() {
        cornerTextInput.style.display = 'block';
        cornerTextInput.value = cornerTextDisplay.innerText;
        cornerTextInput.focus();
        const saveCorner = () => {
            let newText = cornerTextInput.value.trim();
            if(newText === "") {
                cornerTextDisplay.style.display = 'none';
            } else {
                cornerTextDisplay.style.display = 'block';
                cornerTextDisplay.innerText = newText;
            }
            cornerTextInput.style.display = 'none';
            cornerTextInput.removeEventListener('blur', saveCorner);
            cornerTextInput.removeEventListener('keypress', keyHandler);
        };
        const keyHandler = (e) => { if(e.key === 'Enter') saveCorner(); };
        cornerTextInput.addEventListener('blur', saveCorner);
        cornerTextInput.addEventListener('keypress', keyHandler);
    }
    
    // أزرار التفاعل
    function updateLikeUI() {
        likeOverlayBtn.querySelector('i').className = liked ? "fas fa-thumbs-up" : "far fa-thumbs-up";
        if(liked) likeOverlayBtn.classList.add('liked');
        else likeOverlayBtn.classList.remove('liked');
        likeCountOverlay.innerText = likeCount;
    }
    function updateSubscribeUI() {
        if(subscribed) {
            subscribeOverlayBtn.innerText = "مشترك ✓";
            subscribeOverlayBtn.classList.add('subscribed');
        } else {
            subscribeOverlayBtn.innerText = "اشترك";
            subscribeOverlayBtn.classList.remove('subscribed');
        }
    }
    likeOverlayBtn.onclick = () => { liked = !liked; likeCount += liked ? 1 : -1; updateLikeUI(); };
    subscribeOverlayBtn.onclick = () => { subscribed = !subscribed; updateSubscribeUI(); };
    shareOverlayBtn.onclick = () => alert('🔗 تم مشاركة الرابط (تجريبي)');
    
    // التحكم بالصوت
    async function togglePlayPause() {
        if(!audioElem.src || audioElem.src === '') {
            audioStatusSpan.innerHTML = "❓ حمل ملفًا صوتيًا من الإعدادات";
            return;
        }
        if(!audioContext || audioContext.state === 'closed') {
            if(audioUpload.files.length) await initAudioAndVisualizer(audioUpload.files[0]);
            else { audioStatusSpan.innerHTML = "⚠️ يرجى رفع ملف صوتي"; return; }
        }
        if(isPlaying) {
            audioElem.pause();
            if(audioContext) await audioContext.suspend();
            isPlaying = false;
            audioStatusSpan.innerHTML = "⏸️ متوقف مؤقتًا";
        } else {
            await audioContext.resume();
            await audioElem.play();
            isPlaying = true;
            audioStatusSpan.innerHTML = "🎶 تشغيل مع المؤثرات";
        }
        updatePlayPauseUI();
    }
    function updatePlayPauseUI() {
        if(isPlaying) {
            playIconOverlay.className = "fas fa-pause";
            playTextOverlay.innerText = "إيقاف";
        } else {
            playIconOverlay.className = "fas fa-play";
            playTextOverlay.innerText = "تشغيل";
        }
    }
    playPauseOverlayBtn.onclick = togglePlayPause;
    
    // رسم الذبذبات
    function drawVisualization(dataArray) {
        if(!canvasCtx || !canvasWidth || !canvasHeight) return;
        canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
        let avg = 0;
        if(dataArray && dataArray.length) {
            let sum = dataArray.reduce((a,b)=>a+b,0);
            avg = sum / dataArray.length;
        }
        const intensity = Math.min(1, avg / 180);
        const baseColor = currentVizColor;
        const r = parseInt(baseColor.slice(1,3),16);
        const g = parseInt(baseColor.slice(3,5),16);
        const b = parseInt(baseColor.slice(5,7),16);
        const sizeFactor = currentSize / 100;
        let centerX = canvasWidth/2, centerY = canvasHeight/2;
        if(currentPosition === 'top') centerY = canvasHeight * 0.25;
        else if(currentPosition === 'bottom') centerY = canvasHeight * 0.75;
        const maxRadius = Math.min(canvasWidth, canvasHeight) * 0.3 * sizeFactor;
        
        if(currentStyle === 'radial' && dataArray) {
            const bars = dataArray.length;
            for(let i=0; i<bars; i++) {
                let amp = dataArray[i]/255;
                let angle = (i / bars) * Math.PI * 2;
                let radius = 15 + amp * maxRadius;
                let x1 = centerX + Math.cos(angle) * (maxRadius*0.3);
                let y1 = centerY + Math.sin(angle) * (maxRadius*0.3);
                let x2 = centerX + Math.cos(angle) * (maxRadius*0.3 + radius);
                let y2 = centerY + Math.sin(angle) * (maxRadius*0.3 + radius);
                canvasCtx.beginPath();
                canvasCtx.moveTo(x1,y1);
                canvasCtx.lineTo(x2,y2);
                canvasCtx.lineWidth = 3 + amp*8;
                canvasCtx.strokeStyle = `rgba(${r},${g},${b},0.8)`;
                canvasCtx.stroke();
                if(amp>0.6){
                    canvasCtx.beginPath(); canvasCtx.moveTo(x1,y1); canvasCtx.lineTo(x2,y2);
                    canvasCtx.lineWidth = 6; canvasCtx.strokeStyle = `rgba(255,200,100,0.5)`; canvasCtx.stroke();
                }
            }
            canvasCtx.beginPath();
            canvasCtx.arc(centerX, centerY, 12+intensity*25, 0, Math.PI*2);
            canvasCtx.fillStyle = `rgba(${r},${g},${b},0.5)`;
            canvasCtx.fill();
        }
        else if(currentStyle === 'waveform' && dataArray) {
            const step = canvasWidth / dataArray.length;
            canvasCtx.beginPath();
            let x = 0;
            for(let i=0; i<dataArray.length; i++) {
                let amp = (dataArray[i]/255) * (canvasHeight*0.4*sizeFactor);
                let yPos = centerY + (currentPosition==='top'? canvasHeight*0.1 : (currentPosition==='bottom'? -canvasHeight*0.1 : 0));
                let y = yPos - amp + (intensity*10);
                if(i===0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x += step;
            }
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeStyle = `rgba(${r},${g},${b},0.9)`;
            canvasCtx.stroke();
            canvasCtx.beginPath(); x=0;
            for(let i=0; i<dataArray.length; i++) {
                let amp = (dataArray[i]/255) * (canvasHeight*0.35*sizeFactor);
                let yPos = centerY + (currentPosition==='top'? canvasHeight*0.2 : (currentPosition==='bottom'? -canvasHeight*0.2 : 0));
                let y = yPos + amp - (intensity*8);
                if(i===0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x+=step;
            }
            canvasCtx.strokeStyle = `rgba(255,200,80,0.6)`;
            canvasCtx.stroke();
        }
        else if(currentStyle === 'linePulse') {
            const lineLength = 120 * sizeFactor;
            const lineWidth = 4 + intensity * 18;
            canvasCtx.beginPath();
            canvasCtx.moveTo(centerX - lineLength/2, centerY);
            canvasCtx.lineTo(centerX + lineLength/2, centerY);
            canvasCtx.lineWidth = lineWidth;
            canvasCtx.strokeStyle = `rgba(${r},${g},${b},0.95)`;
            canvasCtx.stroke();
            canvasCtx.beginPath();
            canvasCtx.arc(centerX, centerY, 10+intensity*20, 0, Math.PI*2);
            canvasCtx.fillStyle = `rgba(${r},${g},${b},0.4)`;
            canvasCtx.fill();
        }
        else if(currentStyle === 'circleBars' && dataArray) {
            const rings = Math.min(20, dataArray.length);
            for(let rIdx=0; rIdx<rings; rIdx++) {
                let idx = Math.floor(rIdx * (dataArray.length/rings));
                let amp = dataArray[idx]/255;
                let radius = 15 + (rIdx/rings)*maxRadius*1.2 + amp*20*sizeFactor;
                canvasCtx.beginPath();
                canvasCtx.arc(centerX, centerY, radius, 0, Math.PI*2);
                canvasCtx.lineWidth = 2+amp*5;
                canvasCtx.strokeStyle = `rgba(${r},${g},${b},0.6+amp*0.3)`;
                canvasCtx.stroke();
            }
            canvasCtx.beginPath();
            canvasCtx.arc(centerX, centerY, 8+intensity*18, 0, Math.PI*2);
            canvasCtx.fillStyle = `rgba(255,200,80,0.7)`;
            canvasCtx.fill();
        }
    }
    
    function redrawFrame() {
        if(isAudioActive && analyserNode && freqDataArray) {
            analyserNode.getByteFrequencyData(freqDataArray);
            drawVisualization(freqDataArray);
        }
    }
    
    function startAnimationLoop() {
        if(animationId) cancelAnimationFrame(animationId);
        function animate() {
            if(!isAudioActive || !analyserNode) { if(animationId) cancelAnimationFrame(animationId); return; }
            analyserNode.getByteFrequencyData(freqDataArray);
            drawVisualization(freqDataArray);
            animationId = requestAnimationFrame(animate);
        }
        animate();
    }
    
    async function initAudioAndVisualizer(file) {
        if(audioContext) { await audioContext.close(); if(sourceNode) sourceNode.disconnect(); if(animationId) cancelAnimationFrame(animationId); }
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 128;
        freqDataArray = new Uint8Array(analyserNode.frequencyBinCount);
        sourceNode = audioContext.createMediaElementSource(audioElem);
        sourceNode.connect(analyserNode);
        analyserNode.connect(audioContext.destination);
        audioElem.src = URL.createObjectURL(file);
        audioElem.loop = false;
        const rect = document.getElementById('displayArea').getBoundingClientRect();
        canvasWidth = rect.width; canvasHeight = rect.height;
        vizCanvas.width = canvasWidth; vizCanvas.height = canvasHeight;
        canvasCtx = vizCanvas.getContext('2d');
        window.addEventListener('resize', () => {
            const newRect = document.getElementById('displayArea').getBoundingClientRect();
            canvasWidth = newRect.width; canvasHeight = newRect.height;
            vizCanvas.width = canvasWidth; vizCanvas.height = canvasHeight;
            if(isAudioActive) redrawFrame();
        });
        try {
            await audioContext.resume();
            await audioElem.play();
            isPlaying = true; isAudioActive = true;
            updatePlayPauseUI();
            audioStatusSpan.innerHTML = "🎶 يعمل الصوت | خلفية واضحة | مؤثرات بصرية";
            startAnimationLoop();
        } catch(err) {
            audioStatusSpan.innerHTML = "⚠️ اضغط على زر التشغيل لبدء الصوت";
            isAudioActive = false; isPlaying = false;
            updatePlayPauseUI();
        }
    }
    
    audioUpload.onchange = async (e) => {
        if(!e.target.files.length) return;
        if(audioElem.src) { audioElem.pause(); if(sourceNode) sourceNode.disconnect(); if(audioContext) await audioContext.close(); if(animationId) cancelAnimationFrame(animationId); }
        await initAudioAndVisualizer(e.target.files[0]);
    };
    imgUpload.onchange = (e) => {
        if(e.target.files && e.target.files[0]) {
            bgImage.src = URL.createObjectURL(e.target.files[0]);
            bgImage.style.display = 'block';
        }
    };
    
    vizStyleSelect.onchange = (e) => { currentStyle = e.target.value; if(isAudioActive) redrawFrame(); };
    vizPositionSelect.onchange = (e) => { currentPosition = e.target.value; if(isAudioActive) redrawFrame(); };
    vizColorPicker.oninput = (e) => { currentVizColor = e.target.value; if(isAudioActive) redrawFrame(); };
    vizSizeSlider.oninput = (e) => { currentSize = parseInt(e.target.value); if(isAudioActive) redrawFrame(); };
    inTitle.oninput = updateTextAndStyle;
    inSpeakerHidden.oninput = () => { outSpeakerSpan.innerText = inSpeakerHidden.value; updateTextAndStyle(); };
    fontSelect.onchange = updateTextAndStyle;
    colorPicker.oninput = updateTextAndStyle;
    
    // تبديل إظهار/إخفاء الإعدادات
    let settingsVisible = false;
    function toggleSettings() {
        if(settingsVisible) {
            settingsPanel.style.display = 'none';
            settingsToggleBtn.innerHTML = '⚙️ إظهار الإعدادات';
        } else {
            settingsPanel.style.display = 'flex';
            settingsToggleBtn.innerHTML = '🔧 إخفاء الإعدادات';
        }
        settingsVisible = !settingsVisible;
    }
    settingsToggleBtn.onclick = toggleSettings;
    closeSettingsBtn.onclick = () => { if(settingsVisible) toggleSettings(); };
    
    updateTextAndStyle();
    updateLikeUI();
    updateSubscribeUI();
    
    setTimeout(() => {
        const rect = document.getElementById('displayArea').getBoundingClientRect();
        canvasWidth = rect.width; canvasHeight = rect.height;
        vizCanvas.width = canvasWidth; vizCanvas.height = canvasHeight;
        canvasCtx = vizCanvas.getContext('2d');
        canvasCtx.fillStyle = "#050a12";
        canvasCtx.fillRect(0,0,canvasWidth,canvasHeight);
        canvasCtx.fillStyle = "#ffd966aa";
        canvasCtx.font = "bold 18px Cairo";
        canvasCtx.textAlign = "center";
        canvasCtx.fillText("✨ قم برفع ملف صوتي من الإعدادات ✨", canvasWidth/2, canvasHeight/2);
    }, 100);
</script>
